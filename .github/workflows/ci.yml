name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: terraform fmt
        run: terraform -chdir=infra fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform -chdir=infra init -backend=false

      - name: terraform validate
        run: terraform -chdir=infra validate

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install api package
        run: pip install -e "app/api[dev]"

      - name: pytest
        run: pytest app/api -q

  ingestion-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install pytest
        run: pip install pytest

      - name: pytest
        run: pytest ingestion/tests -q

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: npm ci
        working-directory: app/web
        run: npm ci

      - name: npm run build
        working-directory: app/web
        run: npm run build
